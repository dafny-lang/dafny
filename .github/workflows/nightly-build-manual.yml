
# Manual trigger for the nightly build on a given branch.

name: Nightly test and release workflow (Manual trigger)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'The git ref to run on'
        required: true
        type: string
      publish-prerelease:
        description: 'Whether to publish a prerelease'
        required: false
        type: boolean
        default: false
      
jobs:
  nightly-build:
    # Inherited by the reusable chain (which can only reduce these); id-token is
    # needed for the downstream NuGet Trusted Publishing login.
    permissions:
      id-token: write
      contents: write
    uses: ./.github/workflows/nightly-build-reusable.yml
    with:
      ref: ${{ inputs.ref }}
      publish-prerelease: ${{ inputs.publish-prerelease }}
    secrets:
      nuget_user: ${{ secrets.NUGET_USER }}
